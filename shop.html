<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جميع المنتجات - متجري</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f8f9fa; }
        .navbar {
            background: white;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            color: #4b5563;
            font-weight: 600;
        }
        .nav-links a:hover { color: #6366f1; }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.3rem;
        }
        .cart-count {
            position: absolute;
            top: -10px;
            right: -12px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 1400px; margin: 50px auto; padding: 0 30px; }
        .search-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
        }
        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            font-size: 1rem;
        }
        .search-box button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 15px;
            cursor: pointer;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }
        .product-info { padding: 20px; }
        .product-title { font-size: 1.1rem; font-weight: 700; }
        .product-price { font-size: 1.3rem; color: #6366f1; font-weight: 800; }
        .add-to-cart {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
        }
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }
        .cart-overlay.active { visibility: visible; opacity: 1; }
        .cart-drawer {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: white;
            padding: 25px;
            transform: translateX(-100%);
            transition: 0.3s;
            overflow-y: auto;
        }
        .cart-overlay.active .cart-drawer { transform: translateX(0); }
        .customer-form {
            background: #f9fafb;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .customer-form input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
        }
        .checkout-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .footer {
            background: #1f2937;
            color: #9ca3af;
            text-align: center;
            padding: 40px;
            margin-top: 60px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 3000;
            display: none;
        }
        @media (max-width: 768px) {
            .nav-container { flex-direction: column; }
            .search-box button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">🏪 متجري</div>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="shop.html" style="color:#6366f1;">المنتجات</a>
            <a href="orders.html">طلباتي</a>
            <a href="admin.html">🔐 لوحة التحكم</a>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج...">
            <button id="searchBtn">بحث</button>
        </div>
    </div>
    <div class="products-grid" id="productsContainer">جاري التحميل...</div>
</div>

<div class="footer">
    <p>© 2024 متجري - جميع الحقوق محفوظة</p>
</div>

<div id="cartOverlay" class="cart-overlay">
    <div class="cart-drawer">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>🛒 السلة</h2>
            <button id="closeCartBtn" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✖</button>
        </div>
        <div id="cartItemsList"></div>
        <div id="cartTotal" style="font-size:1.3rem; font-weight:bold; margin:20px 0;"></div>
        <div class="customer-form">
            <h3>معلومات العميل</h3>
            <input type="text" id="customerName" placeholder="الاسم الكامل">
            <input type="tel" id="customerPhone" placeholder="رقم الجوال">
            <input type="text" id="customerAddress" placeholder="العنوان">
            <button class="checkout-btn" id="checkoutBtn">💳 إنهاء الطلب</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<!-- زر واتساب عائم -->
<a href="https://wa.me/966500000000?text=مرحباً%20أريد%20الاستفسار%20عن%20منتج" 
   target="_blank" 
   style="position: fixed; bottom: 20px; right: 20px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; text-decoration: none;">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    emailjs.init("YOUR_PUBLIC_KEY");
    
    const firebaseConfig = {
        apiKey: "AIzaSyBvAV5N1aneo4cgDxMVV5x4TL6bQsDalEc",
        authDomain: "my-web-a2cc8.firebaseapp.com",
        projectId: "my-web-a2cc8",
        storageBucket: "my-web-a2cc8.appspot.com",
        messagingSenderId: "61837803690",
        appId: "1:61837803690:web:7be6343d6f07e94ad050d3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allProducts = [];
    let cart = [];

    function showToast(msg, isError = false) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#ef4444' : '#1f2937';
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2500);
    }

    async function loadProducts() {
        const snap = await db.collection("products").get();
        if(snap.empty) await addSampleProducts();
        allProducts = [];
        (await db.collection("products").get()).forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
        renderProducts(allProducts);
    }

    async function addSampleProducts() {
        const samples = [
            { name: "حذاء رياضي", price: 49.99, desc: "مريح وعصري", images: [] },
            { name: "سماعات لاسلكية", price: 89.99, desc: "جودة صوت عالية", images: [] },
            { name: "ساعة ذكية", price: 129.99, desc: "متعددة الوظائف", images: [] }
        ];
        for(let p of samples) await db.collection("products").add(p);
    }

    function renderProducts(products) {
        const container = document.getElementById("productsContainer");
        if(!products.length) { container.innerHTML = "<p>لا توجد منتجات</p>"; return; }
        let html = "";
        products.forEach(p => {
            const imgUrl = (p.images && p.images[0]) ? p.images[0] : `https://picsum.photos/300/260?random=${p.id}`;
            html += `
                <div class="product-card">
                    <img class="product-img" src="${imgUrl}" onerror="this.src='https://picsum.photos/300/260'">
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">$${Number(p.price).toFixed(2)}</div>
                        <button class="add-to-cart" onclick="addToCart('${p.id}')">➕ أضف للسلة</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    window.addToCart = function(productId) {
        const product = allProducts.find(p => p.id == productId);
        if(!product) return;
        const exist = cart.find(i => i.id == productId);
        if(exist) exist.quantity++;
        else cart.push({ id: productId, name: product.name, price: product.price, quantity: 1 });
        saveCart();
        showToast(`✅ ${product.name} أضيف للسلة`);
        updateCartUI();
    };

    function saveCart() {
        localStorage.setItem("shop_cart", JSON.stringify(cart));
        updateCartBadge();
    }

    function loadCart() {
        const saved = localStorage.getItem("shop_cart");
        cart = saved ? JSON.parse(saved) : [];
        updateCartBadge();
    }

    function updateCartBadge() {
        const total = cart.reduce((sum, i) => sum + i.quantity, 0);
        document.getElementById("cartCount").innerText = total;
    }

    function updateCartUI() {
        const container = document.getElementById("cartItemsList");
        if(!cart.length) {
            container.innerHTML = '<p style="text-align:center; padding:40px;">السلة فارغة</p>';
            document.getElementById("cartTotal").innerHTML = "";
            return;
        }
        let itemsHtml = "";
        let total = 0;
        cart.forEach((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            itemsHtml += `
                <div style="border-bottom:1px solid #f0f0f0; padding:15px 0; display:flex; justify-content:space-between;">
                    <div><strong>${item.name}</strong><br><small>$${item.price} × ${item.quantity}</small></div>
                    <button onclick="removeFromCart(${idx})" style="background:#fee2e2; border:none; color:#ef4444; padding:5px 12px; border-radius:20px;">حذف</button>
                </div>
            `;
        });
        container.innerHTML = itemsHtml;
        document.getElementById("cartTotal").innerHTML = `المجموع: $${total.toFixed(2)}`;
    }

    window.removeFromCart = function(index) {
        cart.splice(index,1);
        saveCart();
        updateCartUI();
        showToast("🗑️ تم الحذف");
    };

    async function checkout() {
        if(cart.length === 0) { showToast("⚠️ السلة فارغة"); return; }
        const name = document.getElementById("customerName").value;
        const phone = document.getElementById("customerPhone").value;
        const address = document.getElementById("customerAddress").value;
        if(!name || !name.trim()) { showToast("⚠️ الرجاء إدخال الاسم"); return; }
        if(!phone || !phone.trim()) { showToast("⚠️ الرجاء إدخال رقم الجوال"); return; }
        
        const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
        const order = {
            customerName: name,
            customerPhone: phone,
            customerAddress: address,
            products: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })),
            totalPrice: total,
            dateTime: new Date().toISOString(),
            status: "جديد"
        };
        await db.collection("orders").add(order);
        
        try {
            await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                to_name: "الأدمن",
                from_name: name,
                customer_phone: phone,
                customer_address: address,
                order_total: total.toFixed(2),
                order_products: cart.map(i => `${i.name} (×${i.quantity})`).join(", "),
                order_date: new Date().toLocaleString('ar')
            });
        } catch(e) { console.log("Email error:", e); }
        
        showToast("🎉 تم الطلب بنجاح!");
        cart = [];
        saveCart();
        updateCartUI();
        document.getElementById("cartOverlay").classList.remove("active");
        document.getElementById("customerName").value = "";
        document.getElementById("customerPhone").value = "";
        document.getElementById("customerAddress").value = "";
    }

    document.getElementById("cartIcon").onclick = () => { updateCartUI(); document.getElementById("cartOverlay").classList.add("active"); };
    document.getElementById("closeCartBtn").onclick = () => document.getElementById("cartOverlay").classList.remove("active");
    document.getElementById("checkoutBtn").onclick = checkout;
    document.getElementById("searchBtn").onclick = () => {
        const term = document.getElementById("searchInput").value.toLowerCase();
        renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(term)));
    };

    loadCart();
    loadProducts();
</script>
</body>
</html>
