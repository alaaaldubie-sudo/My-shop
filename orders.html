<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي - متجري</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f1f5f9; }
        .navbar {
            background: white;
            padding: 15px 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: #4b5563; font-weight: 600; }
        .container { max-width: 1000px; margin: 50px auto; padding: 0 30px; }
        .search-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
        }
        .search-box { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .search-box input {
            flex: 1; max-width: 400px; padding: 15px; border: 2px solid #e5e7eb; border-radius: 15px;
        }
        .search-box button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; border: none; padding: 15px 35px; border-radius: 15px; cursor: pointer;
        }
        .order-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .order-details { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e5e7eb; }
        .order-details.show { display: block; }
        .footer {
            background: #1f2937;
            color: #9ca3af;
            text-align: center;
            padding: 40px;
            margin-top: 60px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 3000;
            display: none;
        }
        @media (max-width: 768px) { .nav-container { flex-direction: column; } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">🏪 متجري</div>
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="shop.html">المنتجات</a>
            <a href="orders.html" style="color:#6366f1;">طلباتي</a>
            <a href="admin.html">🔐 لوحة التحكم</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="search-card">
        <h2>🔍 تتبع طلبك</h2>
        <p>أدخل رقم الجوال المستخدم عند الشراء</p>
        <div class="search-box">
            <input type="tel" id="phoneSearch" placeholder="رقم الجوال">
            <button id="searchBtn">بحث</button>
        </div>
    </div>
    <div id="ordersList"></div>
</div>

<div class="footer">
    <p>© 2024 متجري - جميع الحقوق محفوظة</p>
</div>

<div id="toast" class="toast"></div>

<!-- زر واتساب عائم -->
<a href="https://wa.me/966500000000?text=مرحباً%20أريد%20الاستفسار%20عن%20منتج" 
   target="_blank" 
   style="position: fixed; bottom: 20px; right: 20px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; text-decoration: none;">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBvAV5N1aneo4cgDxMVV5x4TL6bQsDalEc",
        authDomain: "my-web-a2cc8.firebaseapp.com",
        projectId: "my-web-a2cc8",
        storageBucket: "my-web-a2cc8.appspot.com",
        messagingSenderId: "61837803690",
        appId: "1:61837803690:web:7be6343d6f07e94ad050d3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.style.backgroundColor = isError ? '#ef4444' : '#1f2937';
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2500);
    }
    
    async function searchOrders() {
        const phone = document.getElementById("phoneSearch").value.trim();
        if(!phone) { showToast("⚠️ الرجاء إدخال رقم الجوال", true); return; }
        
        showToast("🔍 جاري البحث...");
        const snap = await db.collection("orders").where("customerPhone", "==", phone).orderBy("dateTime", "desc").get();
        
        if(snap.empty) {
            document.getElementById("ordersList").innerHTML = '<p style="text-align:center;">لا توجد طلبات لهذا الرقم</p>';
            return;
        }
        
        let html = "";
        snap.forEach(doc => {
            const o = doc.data();
            html += `
                <div class="order-card" onclick="toggleDetails('${doc.id}')">
                    <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
                        <span><strong>${o.customerName}</strong></span>
                        <span>${new Date(o.dateTime).toLocaleString()}</span>
                    </div>
                    <div><strong>💰 ${o.totalPrice?.toFixed(2)} $</strong></div>
                    <div id="details-${doc.id}" class="order-details">
                        <h4>📦 المنتجات:</h4>
                        ${o.products?.map(p => `<div>▪ ${p.name} × ${p.quantity} = ${(p.quantity * p.price).toFixed(2)}$</div>`).join('')}
                        <div style="margin-top:10px;"><strong>📍 العنوان:</strong> ${o.customerAddress || "غير مدخل"}</div>
                        <div><strong>📞 الجوال:</strong> ${o.customerPhone}</div>
                    </div>
                </div>
            `;
        });
        document.getElementById("ordersList").innerHTML = html;
    }
    
    window.toggleDetails = (id) => {
        document.getElementById(`details-${id}`).classList.toggle("show");
    };
    
    document.getElementById("searchBtn").onclick = searchOrders;
    document.getElementById("phoneSearch").onkeyup = (e) => { if(e.key === "Enter") searchOrders(); };
</script>
</body>
</html>
