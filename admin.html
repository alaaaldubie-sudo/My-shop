<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الأدمن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f1f5f9; }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
        }
        .login-card button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .admin-panel { display: none; }
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: #1e293b;
            color: white;
            padding: 30px 20px;
        }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .sidebar nav a:hover, .sidebar nav a.active { background: #334155; color: white; }
        .main-content {
            margin-right: 280px;
            padding: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
        }
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            margin: 5px;
        }
        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #6366f1;
        }
        .order-card {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e5e7eb; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-right: 0; }
        }
    </style>
</head>
<body>

<div id="loginSection" class="login-container">
    <div class="login-card">
        <h2>🔐 دخول الأدمن</h2>
        <input type="password" id="adminPassword" placeholder="كلمة المرور">
        <button id="loginBtn">دخول</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="sidebar">
        <h2 style="margin-bottom:30px;">🏪 متجري</h2>
        <nav>
            <a class="nav-link active" data-page="dashboard">📊 الرئيسية</a>
            <a class="nav-link" data-page="products">📦 المنتجات</a>
            <a class="nav-link" data-page="add-product">➕ إضافة منتج</a>
            <a class="nav-link" data-page="orders">📋 الطلبات</a>
        </nav>
        <button id="logoutBtn" style="margin-top:50px; background:#ef4444;">🚪 تسجيل خروج</button>
    </div>
    
    <div class="main-content">
        <div id="dashboardPage" class="page-content">
            <div class="stats-grid">
                <div class="stat-card"><div><h3>المنتجات</h3><div class="number" id="totalProducts" style="font-size:2rem;">0</div></div><i class="fas fa-box" style="font-size:2rem;"></i></div>
                <div class="stat-card"><div><h3>الطلبات</h3><div class="number" id="totalOrders" style="font-size:2rem;">0</div></div><i class="fas fa-shopping-cart" style="font-size:2rem;"></i></div>
                <div class="stat-card"><div><h3>المبيعات</h3><div class="number" id="totalSales" style="font-size:2rem;">0</div></div><i class="fas fa-dollar-sign" style="font-size:2rem;"></i></div>
            </div>
            <div class="card"><h3>📊 آخر الطلبات</h3><div id="recentOrders"></div></div>
        </div>
        
        <div id="productsPage" class="page-content" style="display:none;">
            <div class="card">
                <h3>📦 المنتجات</h3>
                <table id="productsTable">
                    <thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>إجراءات</th></tr></thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>
        </div>
        
        <div id="addProductPage" class="page-content" style="display:none;">
            <div class="card">
                <h3>➕ إضافة منتج</h3>
                <input type="text" id="prodName" placeholder="اسم المنتج">
                <input type="number" id="prodPrice" placeholder="السعر">
                <textarea id="prodDesc" rows="3" placeholder="الوصف"></textarea>
                <input type="file" id="prodImages" multiple accept="image/*">
                <div id="imagePreview" class="image-preview"></div>
                <button id="addProductBtn">📦 إضافة</button>
            </div>
        </div>
        
        <div id="ordersPage" class="page-content" style="display:none;">
            <div class="card">
                <h3>📋 الطلبات</h3>
                <div id="allOrders"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBvAV5N1aneo4cgDxMVV5x4TL6bQsDalEc",
        authDomain: "my-web-a2cc8.firebaseapp.com",
        projectId: "my-web-a2cc8",
        storageBucket: "my-web-a2cc8.appspot.com",
        messagingSenderId: "61837803690",
        appId: "1:61837803690:web:7be6343d6f07e94ad050d3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    const ADMIN_PASSWORD = "admin123";
    let selectedImages = [];
    
    document.getElementById("loginBtn").onclick = () => {
        if(document.getElementById("adminPassword").value === ADMIN_PASSWORD) {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            loadDashboard();
            loadProductsTable();
            loadAllOrders();
        } else {
            document.getElementById("loginError").innerText = "كلمة المرور خاطئة";
        }
    };
    document.getElementById("logoutBtn").onclick = () => {
        document.getElementById("adminPanel").style.display = "none";
        document.getElementById("loginSection").style.display = "flex";
    };
    
    document.querySelectorAll(".nav-link").forEach(link => {
        link.onclick = () => {
            document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
            link.classList.add("active");
            document.querySelectorAll(".page-content").forEach(p => p.style.display = "none");
            const page = link.getAttribute("data-page");
            if(page === "dashboard") document.getElementById("dashboardPage").style.display = "block";
            if(page === "products") { document.getElementById("productsPage").style.display = "block"; loadProductsTable(); }
            if(page === "add-product") document.getElementById("addProductPage").style.display = "block";
            if(page === "orders") { document.getElementById("ordersPage").style.display = "block"; loadAllOrders(); }
        };
    });
    
    async function loadDashboard() {
        const products = await db.collection("products").get();
        const orders = await db.collection("orders").get();
        document.getElementById("totalProducts").innerText = products.size;
        document.getElementById("totalOrders").innerText = orders.size;
        let sales = 0;
        orders.forEach(doc => sales += doc.data().totalPrice || 0);
        document.getElementById("totalSales").innerText = sales.toFixed(2);
        
        let recent = "";
        orders.forEach(doc => {
            const o = doc.data();
            recent += `<div class="order-card"><strong>${o.customerName}</strong> - ${new Date(o.dateTime).toLocaleString()}<br>المجموع: $${(o.totalPrice||0).toFixed(2)}</div>`;
        });
        document.getElementById("recentOrders").innerHTML = recent || "لا توجد طلبات";
    }
    
    async function loadProductsTable() {
        const snap = await db.collection("products").get();
        let html = "";
        snap.forEach(doc => {
            const p = doc.data();
            html += `<tr>
                <td><img src="${p.images?.[0] || 'https://picsum.photos/50/50'}" style="width:50px;height:50px;object-fit:cover;border-radius:10px;"></td>
                <td>${p.name}</td>
                <td>$${Number(p.price).toFixed(2)}</td>
                <td><button onclick="deleteProduct('${doc.id}')" style="background:#ef4444;">حذف</button></td>
            </tr>`;
        });
        document.getElementById("productsTableBody").innerHTML = html;
    }
    
    window.deleteProduct = async (id) => {
        if(confirm("تأكيد الحذف؟")) {
            await db.collection("products").doc(id).delete();
            loadProductsTable();
            loadDashboard();
        }
    };
    
    document.getElementById("prodImages").onchange = (e) => {
        const preview = document.getElementById("imagePreview");
        preview.innerHTML = "";
        selectedImages = [];
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.createElement("img");
                img.src = ev.target.result;
                img.className = "preview-img";
                preview.appendChild(img);
            };
            reader.readAsDataURL(file);
            selectedImages.push(file);
        });
    };
    
    document.getElementById("addProductBtn").onclick = async () => {
        const name = document.getElementById("prodName").value;
        const price = parseFloat(document.getElementById("prodPrice").value);
        const desc = document.getElementById("prodDesc").value;
        if(!name || isNaN(price)) { alert("املأ الحقول"); return; }
        
        let imageUrls = [];
        for(let file of selectedImages) {
            const ref = storage.ref().child(`products/${Date.now()}_${file.name}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            imageUrls.push(url);
        }
        
        await db.collection("products").add({ name, price, desc, images: imageUrls });
        alert("✅ تمت الإضافة");
        location.reload();
    };
    
    async function loadAllOrders() {
        const snap = await db.collection("orders").orderBy("dateTime", "desc").get();
        let html = "";
        snap.forEach(doc => {
            const o = doc.data();
            html += `<div class="order-card">
                <strong>🧑 ${o.customerName}</strong> | 📞 ${o.customerPhone}<br>
                📍 ${o.customerAddress || "عنوان"}<br>
                💰 ${o.totalPrice?.toFixed(2)} $<br>
                <details><summary>📦 تفاصيل</summary>
                    ${o.products?.map(p => `<div>▪ ${p.name} × ${p.quantity} = ${(p.quantity * p.price).toFixed(2)}$</div>`).join('')}
                </details>
            </div>`;
        });
        document.getElementById("allOrders").innerHTML = html || "لا توجد طلبات";
    }
</script>
</body>
</html>
